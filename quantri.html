<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Soạn Đề PDF & Đáp Án JSON</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- CỘT TRÁI: THÔNG TIN CHUNG & NẠP JSON ĐÁP ÁN (CHIẾM 5 CỘT) -->
        <div class="lg:col-span-5 space-y-6">
            <!-- QUẢN LÝ ĐỀ CŨ -->
            <div class="bg-white rounded-xl shadow-md p-6 border">
                <h2 class="text-sm font-bold text-gray-800 mb-1">Chỉnh sửa đề thi cũ đã đăng</h2>
                <select id="editExamSelect" class="w-full border p-2.5 rounded-lg bg-white font-semibold text-xs mt-2">
                    <option value="">-- Đang tải danh sách đề thi cũ... --</option>
                </select>
                <div class="flex space-x-2 mt-3">
                    <button onclick="loadExamToEdit()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2.5 px-4 rounded-lg text-xs transition shadow flex-grow">
                        📖 Tải dữ liệu để sửa
                    </button>
                    <button id="resetFormBtn" onclick="resetToNewExam()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2.5 px-4 rounded-lg text-xs transition shadow hidden">
                        🆕 Tạo đề mới
                    </button>
                </div>
            </div>

            <!-- THÔNG TIN ĐỀ CHUNG & LINK PDF -->
            <div class="bg-white rounded-xl shadow-md p-6 space-y-4 border text-xs">
                <h2 class="text-sm font-bold text-blue-600 border-b pb-2">1. Thông tin đề thi & Link PDF Google Drive</h2>
                <div>
                    <label class="block font-bold text-gray-600 mb-1">Tên đề thi:</label>
                    <input type="text" id="title" placeholder="Ví dụ: Đề thi thử Hóa Học Sở GD Hà Nội" class="w-full border p-2 rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block font-bold text-gray-600 mb-1">Môn học:</label>
                        <select id="subject" class="w-full border p-2 rounded-lg bg-white font-semibold">
                            <option value="Toán">Toán Học</option>
                            <option value="Hóa">Hóa Học</option>
                            <option value="Vật Lý">Vật Lý</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-600 mb-1">Thời gian (Phút):</label>
                        <input type="number" id="duration" value="90" class="w-full border p-2 rounded-lg font-bold">
                    </div>
                </div>
                <div>
                    <label class="block font-bold text-gray-600 mb-1">Link PDF Đề thi (Google Drive):</label>
                    <input type="text" id="pdfUrl" placeholder="Dán link chia sẻ file PDF đề trên Google Drive" class="w-full border p-2.5 rounded-lg text-xs">
                </div>
            </div>

            <!-- NẠP NHANH ĐÁP ÁN & GIẢI THÍCH QUA JSON -->
            <div class="bg-blue-50/50 p-6 rounded-xl border border-blue-100 space-y-4 text-xs">
                <h2 class="text-sm font-bold text-blue-900 border-b pb-1">2. Nạp nhanh Đáp án & Giải thích bằng JSON</h2>
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Chọn phần muốn nạp:</label>
                    <select id="jsonPart" class="w-full border p-2 rounded-lg bg-white font-semibold text-blue-700">
                        <option value="part1">Dán vào PHẦN I (Trắc nghiệm đơn)</option>
                        <option value="part2">Dán vào PHẦN II (Đúng/Sai)</option>
                        <option value="part3">Dán vào PHẦN III (Trả lời ngắn)</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold text-gray-700 mb-1">Dán đoạn JSON đáp án + giải thích vào đây:</label>
                    <textarea id="tempJson" placeholder='[ { "correct_answer": "A", "explanation": "..." }, ... ]' class="w-full border p-2 rounded-lg font-mono h-48 focus:ring-2 focus:ring-blue-500 bg-white"></textarea>
                </div>
                <button onclick="importJsonToStaging()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow">
                    📥 Nạp Dữ Liệu Vào Phiếu Bên Phải
                </button>
            </div>
        </div>

        <!-- CỘT PHẢI: BẢNG TẠM HIỂN THỊ PHIẾU ĐÁP ÁN ĐỂ KIỂM TRA & SỬA ĐỔI (CHIẾM 7 CỘT) -->
        <div class="lg:col-span-7 bg-white rounded-xl shadow-md p-6 flex flex-col justify-between">
            <div class="space-y-6">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-3">Phiếu biên soạn Đáp án & Giải thích chi tiết</h2>
                
                <div class="space-y-8 overflow-y-auto max-h-[700px] pr-2">
                    <!-- PHẦN I -->
                    <div class="space-y-3">
                        <h3 class="font-extrabold text-blue-700 text-sm uppercase border-b pb-1">PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn</h3>
                        <div id="stagingPart1" class="space-y-3"></div>
                    </div>

                    <!-- PHẦN II -->
                    <div class="space-y-3">
                        <h3 class="font-extrabold text-green-700 text-sm uppercase border-b pb-1">PHẦN II. 4 câu Đúng/Sai</h3>
                        <div id="stagingPart2" class="space-y-4"></div>
                    </div>

                    <!-- PHẦN III -->
                    <div class="space-y-3">
                        <h3 class="font-extrabold text-purple-700 text-sm uppercase border-b pb-1">PHẦN III. 6 câu Trả lời ngắn</h3>
                        <div id="stagingPart3" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- Nút đăng đề -->
            <div class="border-t pt-4 mt-6">
                <button id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg shadow-md text-lg transition">
                    🚀 Đăng Đề Thi PDF Lên Firebase
                </button>
                <div id="statusMsg" class="text-center mt-3 text-sm font-semibold hidden"></div>
            </div>
        </div>

    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAyLs8e_JzKxbCemNrBSSGit4RlzGK8i2c",
          authDomain: "luyenthithpt-25ee7.firebaseapp.com",
          projectId: "luyenthithpt-25ee7",
          storageBucket: "luyenthithpt-25ee7.firebasestorage.app",
          messagingSenderId: "69902728630",
          appId: "1:69902728630:web:d828ddd5cca8f35649d517",
          measurementId: "G-YE1V7SZZ11"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let editingExamId = null;

        window.onload = () => {
            renderStagingFields();
            loadExistingExamsList();
        };

        // Hàm lấy số câu hỏi động dựa theo môn học hiện tại
        function getPart1Count() {
            const subject = document.getElementById('subject').value;
            return subject === 'Toán' ? 12 : 18;
        }

        function renderStagingFields() {
            const part1Count = getPart1Count();

            // Phần I (12 hoặc 18 câu tùy môn học)
            const container1 = document.getElementById('stagingPart1');
            container1.innerHTML = "";
            for (let i = 0; i < part1Count; i++) {
                container1.insertAdjacentHTML('beforeend', `
                    <div class="part1-card border border-blue-100 bg-blue-50/10 p-3 rounded-lg flex items-center space-x-4 text-xs">
                        <span class="font-bold text-blue-900 w-16">Câu ${i+1}:</span>
                        <div class="flex items-center space-x-2">
                            <span>Đáp án:</span>
                            <select class="p1-ans border p-1 rounded bg-white font-bold text-blue-700">
                                <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                            </select>
                        </div>
                        <div class="flex-grow flex items-center space-x-2">
                            <span>Giải thích:</span>
                            <textarea class="p1-exp flex-grow border p-1 rounded h-8 bg-white"></textarea>
                        </div>
                    </div>
                `);
            }

            // Phần II (4 câu Đúng/Sai - Giữ nguyên)
            const container2 = document.getElementById('stagingPart2');
            container2.innerHTML = "";
            for (let i = 0; i < 4; i++) {
                container2.insertAdjacentHTML('beforeend', `
                    <div class="part2-card border border-green-100 bg-green-50/10 p-4 rounded-lg space-y-3 text-xs">
                        <p class="font-bold text-green-900">Câu ${i+1}:</p>
                        <div class="grid grid-cols-4 gap-2">
                            <div>a: <select class="p2-ans-a border p-1 rounded bg-white"><option value="Đ">Đúng</option><option value="S">Sai</option></select></div>
                            <div>b: <select class="p2-ans-b border p-1 rounded bg-white"><option value="Đ">Đúng</option><option value="S">Sai</option></select></div>
                            <div>c: <select class="p2-ans-c border p-1 rounded bg-white"><option value="Đ">Đúng</option><option value="S">Sai</option></select></div>
                            <div>d: <select class="p2-ans-d border p-1 rounded bg-white"><option value="Đ">Đúng</option><option value="S">Sai</option></select></div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span>Giải thích chi tiết:</span>
                            <textarea class="p2-exp flex-grow border p-1 rounded h-10 bg-white"></textarea>
                        </div>
                    </div>
                `);
            }

            // Phần III (6 câu trả lời ngắn - Giữ nguyên)
            const container3 = document.getElementById('stagingPart3');
            container3.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                container3.insertAdjacentHTML('beforeend', `
                    <div class="part3-card border border-purple-100 bg-purple-50/10 p-3 rounded-lg flex items-center space-x-4 text-xs">
                        <span class="font-bold text-purple-900 w-16">Câu ${i+1}:</span>
                        <div class="flex items-center space-x-2">
                            <span>Đáp số:</span>
                            <input type="text" class="p3-ans border p-1 rounded w-28 bg-white font-bold text-center text-purple-700">
                        </div>
                        <div class="flex-grow flex items-center space-x-2">
                            <span>Giải thích:</span>
                            <textarea class="p3-exp flex-grow border p-1 rounded h-8 bg-white"></textarea>
                        </div>
                    </div>
                `);
            }
        }

        // Tự động chỉnh thời gian và vẽ lại số câu theo môn học được chọn
        const subjectSelect = document.getElementById('subject');
        const durationInput = document.getElementById('duration');
        subjectSelect.addEventListener('change', () => {
            durationInput.value = (subjectSelect.value === 'Toán') ? 90 : 50;
            renderStagingFields();
        });

        // Đọc đoạn JSON đáp án dán vào và tự điền lên các ô tương ứng
        function importJsonToStaging() {
            const part = document.getElementById('jsonPart').value;
            const jsonText = document.getElementById('tempJson').value.trim();

            if (!jsonText) {
                alert("Vui lòng dán đoạn JSON!");
                return;
            }

            try {
                let parsedData = JSON.parse(jsonText);
                if (!Array.isArray(parsedData)) {
                    parsedData = [parsedData];
                }

                if (part === 'part1') {
                    const part1Count = getPart1Count();
                    parsedData.forEach((item, idx) => {
                        if (idx < part1Count) {
                            const card = document.querySelectorAll('.part1-card')[idx];
                            if (card) {
                                if (item.correct_answer) card.querySelector('.p1-ans').value = item.correct_answer.toUpperCase();
                                if (item.explanation) card.querySelector('.p1-exp').value = item.explanation;
                            }
                        }
                    });
                } else if (part === 'part2') {
                    parsedData.forEach((item, idx) => {
                        if (idx < 4) {
                            const card = document.querySelectorAll('.part2-card')[idx];
                            if (card) {
                                if (item.correct_answer) {
                                    const arr = item.correct_answer.split(',');
                                    card.querySelector('.p2-ans-a').value = arr[0] || "Đ";
                                    card.querySelector('.p2-ans-b').value = arr[1] || "S";
                                    card.querySelector('.p2-ans-c').value = arr[2] || "S";
                                    card.querySelector('.p2-ans-d').value = arr[3] || "Đ";
                                }
                                if (item.explanation) card.querySelector('.p2-exp').value = item.explanation;
                            }
                        }
                    });
                } else if (part === 'part3') {
                    parsedData.forEach((item, idx) => {
                        if (idx < 6) {
                            const card = document.querySelectorAll('.part3-card')[idx];
                            if (card) {
                                const ans = item.answer || item.correct_answer || "";
                                if (ans) card.querySelector('.p3-ans').value = ans;
                                if (item.explanation) card.querySelector('.p3-exp').value = item.explanation;
                            }
                        }
                    });
                }

                alert("📥 Đã nạp thành công dữ liệu từ JSON vào Phiếu đáp án!");
                document.getElementById('tempJson').value = "";

            } catch (error) {
                console.error(error);
                alert("❌ Lỗi định dạng JSON: " + error.message);
            }
        }

        // Tải danh sách đề cũ
        async function loadExistingExamsList() {
            try {
                const snapshot = await db.collection("exams").orderBy("createdAt", "desc").get();
                const select = document.getElementById('editExamSelect');
                select.innerHTML = '<option value="">-- Chọn đề thi cũ để chỉnh sửa --</option>';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    select.insertAdjacentHTML('beforeend', `<option value="${doc.id}">[${data.subject}] ${data.title}</option>`);
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Tải dữ liệu đề cũ về sửa
        async function loadExamToEdit() {
            const examId = document.getElementById('editExamSelect').value;
            if (!examId) {
                alert("Vui lòng chọn một đề thi!");
                return;
            }

            try {
                const doc = await db.collection("exams").doc(examId).get();
                if (doc.exists) {
                    const data = doc.data();
                    editingExamId = doc.id;

                    document.getElementById('title').value = data.title;
                    document.getElementById('subject').value = data.subject;
                    document.getElementById('duration').value = data.duration;
                    document.getElementById('pdfUrl').value = data.pdf_url || "";

                    // Tạo lại form nhập động dựa theo môn học vừa tải về
                    renderStagingFields();

                    // Đổ đáp án Phần I
                    if (data.part1) {
                        data.part1.forEach((item, i) => {
                            const card = document.querySelectorAll('.part1-card')[i];
                            if (card) {
                                card.querySelector('.p1-ans').value = item.correct_answer || "A";
                                card.querySelector('.p1-exp').value = item.explanation || "";
                            }
                        });
                    }

                    // Đổ đáp án Phần II
                    if (data.part2) {
                        data.part2.forEach((item, i) => {
                            const card = document.querySelectorAll('.part2-card')[i];
                            if (card) {
                                const arr = item.correct_answer ? item.correct_answer.split(',') : ["Đ","S","S","Đ"];
                                card.querySelector('.p2-ans-a').value = arr[0] || "Đ";
                                card.querySelector('.p2-ans-b').value = arr[1] || "S";
                                card.querySelector('.p2-ans-c').value = arr[2] || "S";
                                card.querySelector('.p2-ans-d').value = arr[3] || "Đ";
                                card.querySelector('.p2-exp').value = item.explanation || "";
                            }
                        });
                    }

                    // Đổ đáp án Phần III
                    if (data.part3) {
                        data.part3.forEach((item, i) => {
                            const card = document.querySelectorAll('.part3-card')[i];
                            if (card) {
                                card.querySelector('.p3-ans').value = item.answer || item.correct_answer || "";
                                card.querySelector('.p3-exp').value = item.explanation || "";
                            }
                        });
                    }

                    document.getElementById('resetFormBtn').classList.remove('hidden');
                    document.getElementById('submitBtn').innerText = "💾 Cập Nhật Đề Thi Lên Firebase";
                    alert("📖 Đã tải dữ liệu đề thi thành công!");
                }
            } catch (e) {
                console.error(e);
                alert("Lỗi tải đề cũ: " + e.message);
            }
        }

        function resetToNewExam() {
            editingExamId = null;
            document.getElementById('title').value = "";
            document.getElementById('pdfUrl').value = "";
            document.getElementById('editExamSelect').value = "";
            renderStagingFields();
            document.getElementById('resetFormBtn').classList.add('hidden');
            document.getElementById('submitBtn').innerText = "🚀 Đăng Đề Thi PDF Lên Firebase";
        }

        // Đăng đề thi
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const title = document.getElementById('title').value.trim();
            const subject = document.getElementById('subject').value;
            const duration = parseInt(document.getElementById('duration').value);
            const pdfUrl = document.getElementById('pdfUrl').value.trim();
            const statusMsg = document.getElementById('statusMsg');

            if (!title || !pdfUrl || isNaN(duration)) {
                alert("Vui lòng điền đủ Tiêu đề, Link PDF Đề thi và Thời gian!");
                return;
            }

            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "Đang đồng bộ đáp án và tải lên Firebase...";
            statusMsg.className = "text-center mt-3 text-blue-600 font-bold animate-pulse";

            try {
                // Thu thập Phần I (Số lượng câu hỏi động theo môn học hiện tại)
                const finalPart1 = [];
                const p1Cards = document.querySelectorAll('.part1-card');
                p1Cards.forEach((card) => {
                    finalPart1.push({
                        correct_answer: card.querySelector('.p1-ans').value,
                        explanation: card.querySelector('.p1-exp').value.trim()
                    });
                });

                // Thu thập Phần II (4 câu Đúng/Sai)
                const finalPart2 = [];
                const p2Cards = document.querySelectorAll('.part2-card');
                p2Cards.forEach((card) => {
                    const ansA = card.querySelector('.p2-ans-a').value;
                    const ansB = card.querySelector('.p2-ans-b').value;
                    const ansC = card.querySelector('.p2-ans-c').value;
                    const ansD = card.querySelector('.p2-ans-d').value;

                    finalPart2.push({
                        correct_answer: `${ansA},${ansB},${ansC},${ansD}`,
                        explanation: card.querySelector('.p2-exp').value.trim()
                    });
                });

                // Thu thập Phần III (6 câu Trả lời ngắn)
                const finalPart3 = [];
                const p3Cards = document.querySelectorAll('.part3-card');
                p3Cards.forEach((card) => {
                    finalPart3.push({
                        answer: card.querySelector('.p3-ans').value.trim(),
                        explanation: card.querySelector('.p3-exp').value.trim()
                    });
                });

                if (editingExamId) {
                    await db.collection("exams").doc(editingExamId).update({
                        title: title,
                        subject: subject,
                        duration: duration,
                        pdf_url: pdfUrl,
                        part1: finalPart1,
                        part2: finalPart2,
                        part3: finalPart3
                    });
                    statusMsg.innerText = "💾 Cập nhật đề thi thành công!";
                    statusMsg.className = "text-center mt-3 text-yellow-600 font-bold text-lg";
                    resetToNewExam();
                } else {
                    await db.collection("exams").add({
                        title: title,
                        subject: subject,
                        duration: duration,
                        pdf_url: pdfUrl,
                        part1: finalPart1,
                        part2: finalPart2,
                        part3: finalPart3,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    statusMsg.innerText = "🚀 Đăng đề thi mới lên Firebase thành công!";
                    statusMsg.className = "text-center mt-3 text-green-600 font-bold text-lg";
                    resetToNewExam();
                }

                loadExistingExamsList();

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "❌ Lỗi: " + error.message;
                statusMsg.className = "text-center mt-3 text-red-600 font-bold";
            }
        });
    </script>
</body>
</html>
